<!-- Seamless gold "khatam" 8-point-star lattice (transparent). The alternate card
     motif to arabesque-gold.svg. Two overlapping squares (one rotated 45°) form
     each eight-point star; stars sit at the tile centre, corners and edge mid-
     points so the pattern tiles seamlessly. Visibility tuned in CSS (low opacity). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <g id="star" fill="none" stroke="#C9A24B" stroke-width="1.3" stroke-linejoin="round">
      <rect x="-46" y="-46" width="92" height="92"/>
      <rect x="-46" y="-46" width="92" height="92" transform="rotate(45)"/>
      <circle r="7"/>
    </g>
  </defs>

  <g opacity="0.85">
    <use href="#star" x="100" y="100"/>
    <use href="#star" x="0"   y="0"/>
    <use href="#star" x="200" y="0"/>
    <use href="#star" x="0"   y="200"/>
    <use href="#star" x="200" y="200"/>
    <use href="#star" x="100" y="0"/>
    <use href="#star" x="100" y="200"/>
    <use href="#star" x="0"   y="100"/>
    <use href="#star" x="200" y="100"/>
  </g>
</svg>
