<!-- Dubai skyline — stylised silhouette (CSS mask, tinted gold).
     Central tapering Burj Khalifa spire, flanking towers of varied heights, the
     Burj Al Arab "sail" at right, and the Dubai Frame at left. Reads as Dubai. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="#000">
  <!-- Ground line implied; everything sits on y=100. -->

  <!-- Dubai Frame (left). -->
  <path d="M8 100 V46 H30 V100 H26 V52 H12 V100 Z"/>
  <rect x="8" y="42" width="22" height="4"/>

  <!-- Low-rise towers cluster (left-centre). -->
  <rect x="36" y="64" width="9" height="36"/>
  <rect x="47" y="56" width="7" height="44"/>
  <rect x="56" y="70" width="10" height="30"/>

  <!-- Burj Khalifa — central tapering spire with setbacks. -->
  <path d="M96 100 L98 30 L99 12 L100.2 4 L101 12 L102 30 L104 100
           L99.5 100 L99 56 L97 56 L96.5 100 Z"/>
  <path d="M93 100 L95 44 L105 44 L107 100 Z"/>
  <path d="M89 100 L92 60 L108 60 L111 100 Z"/>
  <rect x="99.6" y="0" width="0.8" height="6"/>

  <!-- Twin towers (right of Burj). -->
  <path d="M118 100 V52 L122 48 L126 52 V100 Z"/>
  <path d="M128 100 V58 L132 54 L136 58 V100 Z"/>
  <rect x="140" y="66" width="9" height="34"/>

  <!-- Emirates-style domed tower. -->
  <path d="M152 100 V62 Q156 54 160 62 V100 Z"/>

  <!-- Burj Al Arab "sail" (right). -->
  <path d="M176 100 Q172 60 184 24 Q186 20 188 24 L188 100 Z"/>
  <path d="M188 100 V40 Q182 58 184 100 Z"/>
</svg>
