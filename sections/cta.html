     sections/cta.html — Full-width conversion band
     ---------------------------------------------------------------------------
     data-bg-section="cta" -> Palm Jumeirah silhouette. Market chips injected.
     ======================================================================== -->
<section class="cta-band section" id="cta" data-bg-section="cta">
  <div class="container" data-reveal>
    <p class="eyebrow">Let's Trade</p>
    <h2>Ready to place a <span class="text-gold">bulk inquiry?</span></h2>
    <p class="lead" style="margin:0 auto 2rem">Talk to our trade desk — we reply fast.</p>

    <div class="cta-actions">
      <a class="btn btn--gold" data-cta="whatsapp">Request a Bulk Quote</a>
      <a class="btn btn--ghost" data-cta="gmail">Email Our Trade Desk</a>
    </div>

    <div class="market-row">
      <span data-markets></span>
    </div>
  </div>
</section>
