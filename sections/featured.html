<!-- ===========================================================================
     sections/featured.html — Featured products carousel (auto-rotating deck)
     ---------------------------------------------------------------------------
     Sits just after the About story on the home page. Cards are injected by
     assets/js/featured.js from the live catalogue (products flagged "featured").
     5 across on desktop, 3 across on mobile; the deck quietly rotates through all
     featured items with a gold crossfade. "View All Products" -> products.html.
     ======================================================================== -->
<section class="featured section section--tight" id="featured" data-bg-section="products">
  <div class="container">
    <div class="section-head section-head--center" data-reveal>
      <p class="eyebrow">Featured Selection</p>
      <h2>Signature Products, <span class="text-gold">Hand-Picked</span></h2>
      <span class="title-rule"></span>
    </div>

    <!-- Rotating featured deck (injected) -->
    <div class="featured-row" data-featured aria-label="Featured products"></div>

    <div class="row row--center" style="margin-top:var(--space-6)">
      <a class="btn btn--gold" href="#products">View All Products &rarr;</a>
    </div>
  </div>
</section>
