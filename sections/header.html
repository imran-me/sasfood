<!-- ===========================================================================
     sections/header.html — Sticky header + full-screen mobile overlay menu
     ---------------------------------------------------------------------------
     States handled by assets/js/nav.js (.is-scrolled / .is-open).
     Brand mark is the gold emblem; contact buttons read links from config.js.
     ======================================================================== -->
<header class="site-header">
  <!-- Brand lockup -->
  <a class="brand" href="index.html" aria-label="Sara Alsalam — home">
    <img class="mark" src="assets/img/brand/logo.png" alt="Sara Alsalam (Sara Gold) logo">
    <span class="wordmark">
      <b>Sara Alsalam</b>
      <small>Foodstuff Trading LLC</small>
    </span>
  </a>

  <!-- Desktop nav -->
  <nav class="nav" aria-label="Primary">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Right cluster -->
  <div class="header-cta">
    <a class="icon-btn" data-config-href="whatsapp" aria-label="Chat on WhatsApp">
      <!-- WhatsApp glyph -->
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.7-.6-3-1.3-4.9-4.3-5-4.5-.2-.2-1.2-1.6-1.2-3 0-1.5.7-2.2 1-2.5.2-.3.5-.4.7-.4h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.4 0 .5l-.4.6-.3.3c-.2.2-.3.4-.2.7.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.2.1.4.1.6-.1l.8-1c.2-.2.4-.2.6-.1l1.9.9c.3.1.5.2.5.4.1.2.1.9-.1 1.5Z"/></svg>
    </a>
    <a class="icon-btn" data-config-href="email" aria-label="Email our trade desk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
    </a>
    <a class="btn btn--gold" data-cta="whatsapp" data-body="">Request a Quote</a>
  </div>

  <!-- Mobile hamburger -->
  <button class="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
</header>

<!-- Full-screen mobile overlay menu -->
<div class="mobile-menu" id="mobile-menu" aria-label="Mobile">
  <button class="close" aria-label="Close menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m6 6 12 12M18 6 6 18"/></svg>
  </button>
  <nav aria-label="Mobile primary">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="menu-actions">
    <a class="btn btn--whatsapp" data-config-href="whatsapp">WhatsApp</a>
    <a class="btn btn--ghost" data-config-href="email">Email</a>
    <a class="btn btn--gold" data-cta="whatsapp">Request a Quote</a>
  </div>
  <div class="menu-socials">
    <a data-config-href="instagram" aria-label="Instagram">Instagram</a>
    <a data-config-href="linkedin" aria-label="LinkedIn">LinkedIn</a>
  </div>
  <img class="menu-silhouette" src="assets/img/silhouettes/burj-khalifa.svg" alt="" aria-hidden="true">
</div>
